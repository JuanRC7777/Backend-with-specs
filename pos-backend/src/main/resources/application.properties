# =============================================
# Configuración del Sistema POS
# =============================================
spring.application.name=pos-backend
server.port=8081

# =============================================
# Base de Datos MySQL
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/pos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# SQL Init (ejecutar data.sql al arrancar)
# =============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# =============================================
# JWT
# =============================================
jwt.secret=miClaveSecretaSuperSeguraParaJWTPOS2024
jwt.expiration=86400000

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method