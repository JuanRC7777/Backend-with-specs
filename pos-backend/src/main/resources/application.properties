# =============================================
# Configuración del Sistema POS
# =============================================
spring.application.name=pos-backend
server.port=8081

# =============================================
# Base de Datos MySQL
# =============================================
# Configuración con soporte para variables de entorno
# Desarrollo: usa valores por defecto
# Producción: define DB_URL, DB_USERNAME, DB_PASSWORD como variables de entorno
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/pos_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# =============================================
# SQL Init (ejecutar data.sql al arrancar)
# =============================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# =============================================
# JWT
# =============================================
# Configuración con soporte para variables de entorno
# Desarrollo: usa valor por defecto
# Producción: define JWT_SECRET como variable de entorno
jwt.secret=${JWT_SECRET:miClaveSecretaSuperSeguraParaJWTPOS2024}
jwt.expiration=86400000

# =============================================
# Swagger / OpenAPI
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method